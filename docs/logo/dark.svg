<svg width="600" height="150" viewBox="0 0 600 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing Node Mesh Icon -->
  <g transform="translate(20, 25)">
    <circle cx="50" cy="50" r="40" stroke="url(#paint0_linear)" stroke-width="4" fill="none"/>
    <circle cx="50" cy="50" r="28" stroke="#00D67D" stroke-width="2" fill="none" opacity="0.8"/>
    <circle cx="50" cy="50" r="10" fill="#00D67D"/>
    <!-- Connecting Nodes -->
    <circle cx="20" cy="20" r="6" fill="#00D67D"/>
    <circle cx="80" cy="80" r="6" fill="#00D67D"/>
    <circle cx="80" cy="20" r="6" fill="#00D67D"/>
    <circle cx="20" cy="80" r="6" fill="#00D67D"/>
    <!-- Mesh Lines -->
    <path d="M25 25 L45 45 M75 75 L55 55 M75 25 L55 45 M25 75 L45 55" stroke="#00D67D" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Text: Neural Mesh -->
  <text x="140" y="80" font-family="'Inter', sans-serif, system-ui" font-size="42" font-weight="bold" fill="#FAFAFA">Neural Mesh</text>
  
  <!-- Text: Protocol -->
  <text x="142" y="115" font-family="'Inter', sans-serif, system-ui" font-size="28" font-weight="500" fill="#00D67D" letter-spacing="0.1em">PROTOCOL</text>

  <!-- Gradients -->
  <defs>
    <linearGradient id="paint0_linear" x1="10" y1="10" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#00D67D"/>
    </linearGradient>
  </defs>
</svg>
