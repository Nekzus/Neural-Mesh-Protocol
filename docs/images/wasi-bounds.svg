<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="320" fill="#09090b" rx="16" />
    <!-- Fonts & Styles -->
    <style>
        text {
            font-family: 'Inter', system-ui, sans-serif;
            fill: #FAFAFA;
            font-size: 13px;
        }

        .title {
            font-weight: 700;
            font-size: 16px;
            fill: #FFFFFF;
        }

        .box {
            fill: #18181b;
            stroke: #3f3f46;
            stroke-width: 2;
            rx: 8;
        }

        .box-red {
            fill: #450a0a;
            stroke: #ef4444;
            stroke-width: 2;
            rx: 8;
        }

        .box-green {
            fill: #052e16;
            stroke: #10b981;
            stroke-width: 2;
            rx: 8;
        }

        .box-transparent {
            fill: none;
            stroke: #3f3f46;
            stroke-width: 2;
            rx: 12;
            stroke-dasharray: 4 4;
        }

        .line {
            stroke: #52525b;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }

        .line-red {
            stroke: #ef4444;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }

        .line-green {
            stroke: #10b981;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }

        .arrow-red {
            fill: #ef4444;
        }

        .arrow-green {
            fill: #10b981;
        }
    </style>
    <defs>
        <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-red" />
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-green" />
        </marker>
    </defs>

    <rect x="40" y="40" width="200" height="240" class="box-transparent" />
    <text x="140" y="65" text-anchor="middle" class="title">Untrusted Logic</text>

    <rect x="300" y="40" width="200" height="240" class="box" />
    <text x="400" y="65" text-anchor="middle" class="title">WASI Engine</text>

    <rect x="560" y="40" width="200" height="240" class="box-transparent" />
    <text x="660" y="65" text-anchor="middle" class="title">Physical Host</text>

    <!-- Nodes -->
    <rect x="60" y="100" width="160" height="40" class="box" />
    <text x="140" y="125" text-anchor="middle">Reads `/etc/shadow`</text>

    <rect x="60" y="200" width="160" height="40" class="box" />
    <text x="140" y="225" text-anchor="middle">Reads `error.txt`</text>

    <!-- Bounds -->
    <rect x="320" y="100" width="160" height="40" class="box-red" />
    <text x="400" y="125" text-anchor="middle" fill="#fca5a5">Immediate Trap</text>

    <rect x="320" y="200" width="160" height="40" class="box-green" />
    <text x="400" y="225" text-anchor="middle" fill="#6ee7b7">Virtual `/logs`</text>

    <rect x="580" y="200" width="160" height="40" class="box-green" />
    <text x="660" y="225" text-anchor="middle" fill="#6ee7b7">Host Sector</text>

    <!-- Lines -->
    <path d="M 220 120 L 310 120" class="line-red" marker-end="url(#arrow-red)" />
    <path d="M 220 220 L 310 220" class="line-green" marker-end="url(#arrow-green)" />
    <path d="M 480 220 L 570 220" class="line-green" marker-end="url(#arrow-green)" />
    <text x="525" y="210" text-anchor="middle" font-size="10" fill="#10b981">Map FD</text>

</svg>