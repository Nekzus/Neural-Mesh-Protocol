<svg viewBox="0 0 800 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow-agent-l" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-worker-l" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-mesh-l" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <style>
        .text-title-l {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 16px;
            fill: #1e293b;
        }

        .text-sub-l {
            font-family: system-ui, sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: #475569;
        }

        .text-tiny-l {
            font-family: monospace;
            font-size: 11px;
            fill: #d97706;
        }

        .conn-line-l {
            stroke: #cbd5e1;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dashAnimL 20s linear infinite;
        }

        .conn-line-rx-l {
            stroke: #9333ea;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dashAnimL 20s linear infinite;
        }

        @keyframes dashAnimL {
            to {
                stroke-dashoffset: -400;
            }
        }

        @keyframes move90-l {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(90px);
                opacity: 0;
            }
        }

        @keyframes move50-l {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(50px);
                opacity: 0;
            }
        }

        @keyframes moveReturn-l {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translateX(-590px);
                opacity: 0;
            }
        }

        @keyframes rxPath1-l {
            0% {
                transform: translate(680px, 260px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            14.8% {
                transform: translate(680px, 300px);
            }

            85.2% {
                transform: translate(490px, 300px);
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translate(490px, 260px);
                opacity: 0;
            }
        }

        @keyframes rxPath2-l {
            0% {
                transform: translate(450px, 260px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            15.4% {
                transform: translate(450px, 340px);
            }

            84.6% {
                transform: translate(90px, 340px);
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translate(90px, 260px);
                opacity: 0;
            }
        }

        .anim-90-1-l {
            animation: move90-l 1.5s linear infinite;
        }

        .anim-90-2-l {
            animation: move90-l 1.5s linear infinite 0.75s;
        }

        .anim-50-1-l {
            animation: move50-l 1s linear infinite;
        }

        .anim-50-2-l {
            animation: move50-l 1s linear infinite 0.5s;
        }

        .anim-ret-1-l {
            animation: moveReturn-l 3s linear infinite;
        }

        .anim-ret-2-l {
            animation: moveReturn-l 3s linear infinite 1.5s;
        }

        .anim-r1-1-l {
            animation: rxPath1-l 2s linear infinite;
        }

        .anim-r1-2-l {
            animation: rxPath1-l 2s linear infinite 1s;
        }

        .anim-r2-1-l {
            animation: rxPath2-l 3.5s linear infinite;
        }

        .anim-r2-2-l {
            animation: rxPath2-l 3.5s linear infinite 1.75s;
        }

        @keyframes spinGearL {
            100% {
                transform: rotate(360deg);
            }
        }

        .spin-l {
            transform-box: fill-box;
            transform-origin: center;
            animation: spinGearL 3s linear infinite;
        }
    </style>

    <!-- Title -->
    <text x="400" y="40" class="text-title-l" text-anchor="middle" font-size="20" fill="#0284c7">TypeScript SDK Runtime
        Flow (Node.js Tier-0)</text>

    <!-- Lines -->
    <line x1="160" y1="200" x2="250" y2="200" class="conn-line-l" />
    <line x1="370" y1="200" x2="420" y2="200" class="conn-line-l" />
    <line x1="560" y1="200" x2="610" y2="200" class="conn-line-l" />
    <line x1="750" y1="200" x2="800" y2="200" class="conn-line-l" />

    <!-- 1. Agent App -->
    <rect x="20" y="140" width="140" height="120" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2"
        filter="url(#glow-agent-l)" />
    <text x="90" y="180" class="text-title-l" text-anchor="middle">Agent App</text>
    <text x="90" y="200" class="text-sub-l" text-anchor="middle">LLM Logic</text>
    <text x="90" y="220" class="text-sub-l" text-anchor="middle">Emitter</text>

    <!-- 2. Node.js SDK Container -->
    <rect x="230" y="80" width="550" height="280" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"
        stroke-dasharray="10 5" />
    <text x="505" y="110" class="text-sub-l" text-anchor="middle" fill="#64748b">@neural-mesh/sdk (Node V8
        Environment)</text>

    <!-- 2A. GuardianTS -->
    <rect x="250" y="140" width="120" height="120" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="2" />
    <text x="310" y="180" class="text-title-l" text-anchor="middle" fill="#d97706">GuardianTS</text>
    <text x="310" y="200" class="text-sub-l" text-anchor="middle">AST Heuristics</text>
    <text x="310" y="220" class="text-tiny-l" text-anchor="middle">(Cero-time Scan)</text>

    <!-- 2B. Worker Pool (Piscina) -->
    <rect x="420" y="140" width="140" height="120" rx="8" fill="#ffffff" stroke="#9333ea" stroke-width="2"
        filter="url(#glow-worker-l)" />
    <text x="490" y="170" class="text-title-l" text-anchor="middle" fill="#7e22ce">Worker Pool</text>
    <text x="490" y="190" class="text-sub-l" text-anchor="middle">Parallel Kyber768</text>
    <text x="490" y="210" class="text-sub-l" text-anchor="middle">&amp; AES-256-GCM</text>
    <g transform="translate(490, 235)">
        <g class="spin-l">
            <circle cx="0" cy="0" r="12" fill="none" stroke="#d946ef" stroke-width="2" stroke-dasharray="6 3" />
            <circle cx="0" cy="0" r="6" fill="#c084fc" />
        </g>
    </g>

    <!-- 2C. MeshNode -->
    <rect x="610" y="140" width="140" height="120" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"
        filter="url(#glow-mesh-l)" />
    <text x="680" y="180" class="text-title-l" text-anchor="middle" fill="#059669">MeshNode</text>
    <text x="680" y="200" class="text-sub-l" text-anchor="middle">Libp2p Yamux</text>
    <text x="680" y="220" class="text-tiny-l" text-anchor="middle" fill="#047857">Multiplex Egress</text>

    <!-- Particles -->
    <!-- Gap 1: Agent to Guardian -->
    <g transform="translate(160, 200)">
        <circle cx="0" cy="0" r="4" fill="#0284c7" class="anim-90-1-l" />
        <circle cx="0" cy="0" r="4" fill="#0284c7" class="anim-90-2-l" />
    </g>

    <!-- Gap 2: Guardian to Worker -->
    <g transform="translate(370, 200)">
        <circle cx="0" cy="0" r="4" fill="#d97706" class="anim-50-1-l" />
        <circle cx="0" cy="0" r="4" fill="#d97706" class="anim-50-2-l" />
    </g>

    <!-- Gap 3: Worker to MeshNode -->
    <g transform="translate(560, 200)">
        <circle cx="0" cy="0" r="4" fill="#9333ea" class="anim-50-1-l" />
        <circle cx="0" cy="0" r="4" fill="#9333ea" class="anim-50-2-l" />
    </g>

    <!-- Gap 4: MeshNode Ext -->
    <g transform="translate(750, 200)">
        <circle cx="0" cy="0" r="4" fill="#059669" class="anim-50-1-l" />
        <circle cx="0" cy="0" r="4" fill="#059669" class="anim-50-2-l" />
    </g>

    <!-- Return Flow 1: MeshNode -> Worker Pool -->
    <path d="M 680 260 L 680 300 L 490 300 L 490 260" fill="none" class="conn-line-rx-l" />
    <text x="585" y="290" class="text-sub-l" text-anchor="middle" fill="#7e22ce">ZK-Receipt / AES Payload</text>

    <!-- Return Particles 1 -->
    <circle cx="0" cy="0" r="5" fill="#9333ea" class="anim-r1-1-l" />
    <circle cx="0" cy="0" r="5" fill="#9333ea" class="anim-r1-2-l" />

    <!-- Return Flow 2: Worker Pool -> Agent App -->
    <path d="M 450 260 L 450 340 L 90 340 L 90 260" fill="none" class="conn-line-rx-l" />
    <text x="270" y="330" class="text-sub-l" text-anchor="middle" fill="#0284c7">Verified Plaintext Result</text>

    <!-- Return Particles 2 -->
    <circle cx="0" cy="0" r="5" fill="#0284c7" class="anim-r2-1-l" />
    <circle cx="0" cy="0" r="5" fill="#0284c7" class="anim-r2-2-l" />
</svg>