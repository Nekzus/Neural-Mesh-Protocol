<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="320" fill="#09090b" rx="16" />
    <!-- Fonts & Styles -->
    <style>
        text {
            font-family: 'Inter', system-ui, sans-serif;
            fill: #FAFAFA;
            font-size: 13px;
        }

        .title {
            font-weight: 700;
            font-size: 16px;
            fill: #FFFFFF;
        }

        .box {
            fill: #18181b;
            stroke: #3f3f46;
            stroke-width: 2;
            rx: 50;
        }

        .box-target {
            fill: #27272a;
            stroke: #FAFAFA;
            stroke-width: 2;
            rx: 50;
        }

        .box-agent {
            fill: #000;
            stroke: #FAFAFA;
            stroke-width: 2;
            stroke-dasharray: 4 4;
            rx: 8;
        }

        .line {
            stroke: #52525b;
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 4 4;
        }

        .line-direct {
            stroke: #FAFAFA;
            stroke-width: 3;
            fill: none;
        }

        .arrow {
            fill: #FAFAFA;
        }
    </style>
    <defs>
        <marker id="arrow-direct" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
        </marker>
    </defs>

    <text x="400" y="40" text-anchor="middle" class="title">KADEMLIA DHT TOPOLOGY</text>

    <!-- Agent -->
    <rect x="50" y="130" width="120" height="60" class="box-agent" />
    <text x="110" y="165" text-anchor="middle">Agent Node</text>

    <!-- DHT Cloud Nodes -->
    <circle cx="280" cy="80" r="30" class="box" />
    <text x="280" y="85" text-anchor="middle" font-size="11">Peer 1x</text>

    <circle cx="280" cy="240" r="30" class="box" />
    <text x="280" y="245" text-anchor="middle" font-size="11">Peer 9x</text>

    <circle cx="450" cy="110" r="30" class="box" />
    <text x="450" y="115" text-anchor="middle" font-size="11">Peer 5x</text>

    <circle cx="450" cy="210" r="30" class="box" />
    <text x="450" y="215" text-anchor="middle" font-size="11">Peer 2x</text>

    <!-- Target -->
    <circle cx="680" cy="160" r="45" class="box-target" />
    <text x="680" y="155" text-anchor="middle" font-weight="700">Target Server</text>
    <text x="680" y="175" text-anchor="middle" font-size="10">(Logs Database)</text>

    <!-- Connections Search -->
    <path d="M 170 150 L 250 90" class="line" />
    <path d="M 170 170 L 250 230" class="line" />
    <path d="M 310 80 L 420 100" class="line" />
    <path d="M 310 240 L 420 220" class="line" />
    <path d="M 480 110 L 640 145" class="line" />
    <path d="M 480 210 L 640 175" class="line" />

    <!-- Direct QUIC Connection -->
    <path d="M 170 160 L 625 160" class="line-direct" marker-end="url(#arrow-direct)" />
    <rect x="330" y="150" width="150" height="20" fill="#09090b" />
    <text x="405" y="164" text-anchor="middle" font-size="11" font-weight="700">Direct QUIC Con.</text>

</svg>