<svg viewBox="0 0 800 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dropshadow filter for glowing text/boxes -->
        <filter id="glow-blue-light" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-purple-light" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-rose-light" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- Animation Paths -->
        <path id="path-req-light" d="M 220 160 L 580 160" fill="none" />
        <path id="path-res-light" d="M 580 280 L 220 280" fill="none" />
        <path id="path-processing-light"
            d="M 660 180 C 690 180, 710 200, 710 230 C 710 260, 690 280, 660 280 C 630 280, 610 260, 610 230 C 610 200, 630 180, 660 180 Z"
            fill="none" />
    </defs>

    <style>
        .text-title-light {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 700;
            font-size: 18px;
            fill: #1e293b;
        }

        .text-sub-light {
            font-family: system-ui, -apple-system, sans-serif;
            font-weight: 500;
            font-size: 14px;
            fill: #475569;
        }

        .text-tiny-light {
            font-family: monospace;
            font-size: 12px;
            fill: #e11d48;
        }

        .conn-line-light {
            stroke: #cbd5e1;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -400;
            }
        }

        @keyframes moveReq {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(360px);
                opacity: 0;
            }
        }

        .req-0 {
            animation: moveReq 2s linear infinite;
            opacity: 0;
        }

        .req-1 {
            animation: moveReq 2s linear infinite -0.66s;
            opacity: 0;
        }

        .req-2 {
            animation: moveReq 2s linear infinite -1.33s;
            opacity: 0;
        }

        @keyframes rotateProc {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .proc-0 {
            animation: rotateProc 1.5s linear infinite;
        }

        .proc-1 {
            animation: rotateProc 1.5s linear infinite -0.5s;
        }

        .proc-2 {
            animation: rotateProc 1.5s linear infinite -1s;
        }

        @keyframes moveRes {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(-360px);
                opacity: 0;
            }
        }

        .res-0 {
            animation: moveRes 2.5s linear infinite;
            opacity: 0;
        }

        .res-1 {
            animation: moveRes 2.5s linear infinite -0.83s;
            opacity: 0;
        }

        .res-2 {
            animation: moveRes 2.5s linear infinite -1.66s;
            opacity: 0;
        }
    </style>

    <!-- Connection Lines Background -->
    <line x1="220" y1="160" x2="580" y2="160" class="conn-line-light" />
    <line x1="580" y1="280" x2="220" y2="280" class="conn-line-light" />
    <text x="400" y="145" class="text-sub-light" text-anchor="middle">QUIC + Kyber Encapsulation (gRPC)</text>
    <text x="400" y="305" class="text-sub-light" text-anchor="middle">ZK-Receipt + AES Result</text>

    <!-- Agent Node -->
    <rect x="20" y="100" width="200" height="240" rx="12" fill="#ffffff" stroke="#0ea5e9" stroke-width="2" />
    <text x="120" y="140" class="text-title-light" text-anchor="middle">Agent Client</text>
    <text x="120" y="165" class="text-sub-light" text-anchor="middle">Logic Injector</text>

    <rect x="40" y="200" width="160" height="120" rx="6" fill="#f8fafc" stroke="#e2e8f0" />
    <text x="120" y="225" class="text-sub-light" text-anchor="middle">1. Build WebAssembly</text>
    <text x="120" y="255" class="text-sub-light" text-anchor="middle">2. PQC Encrypt</text>
    <text x="120" y="285" class="text-sub-light" text-anchor="middle">3. Stream Logic</text>

    <!-- Data Node -->
    <rect x="580" y="100" width="200" height="240" rx="12" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" />
    <text x="680" y="140" class="text-title-light" text-anchor="middle">Data Server</text>
    <text x="680" y="165" class="text-sub-light" text-anchor="middle">Zero-Trust Node</text>

    <rect x="600" y="180" width="160" height="140" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="2" />
    <text x="680" y="205" class="text-tiny-light" text-anchor="middle">TEE ENCLAVE / WASI</text>
    <text x="680" y="235" class="text-sub-light" text-anchor="middle" fill="#881337">1. Guardian AST</text>
    <text x="680" y="255" class="text-sub-light" text-anchor="middle" fill="#881337">2. Blind Computing</text>
    <text x="680" y="275" class="text-sub-light" text-anchor="middle" fill="#881337">3. Gen ZK Proof</text>

    <!-- Animated Circulating Particles -->
    <!-- Request Packets (Blue) -->
    <circle cx="220" cy="160" r="6" fill="#0ea5e9" filter="url(#glow-blue-light)" class="req-0" />
    <circle cx="220" cy="160" r="6" fill="#0ea5e9" filter="url(#glow-blue-light)" class="req-1" />
    <circle cx="220" cy="160" r="6" fill="#0ea5e9" filter="url(#glow-blue-light)" class="req-2" />

    <!-- Processing Packets inside WASI (Rose/Yellow) -->
    <g transform="translate(660, 230)">
        <circle cx="0" cy="-50" r="4" fill="#f59e0b" filter="url(#glow-rose-light)" class="proc-0" />
        <circle cx="0" cy="-50" r="4" fill="#f59e0b" filter="url(#glow-rose-light)" class="proc-1" />
        <circle cx="0" cy="-50" r="4" fill="#f59e0b" filter="url(#glow-rose-light)" class="proc-2" />
    </g>

    <!-- Response Packets (Purple) -->
    <circle cx="580" cy="280" r="6" fill="#8b5cf6" filter="url(#glow-purple-light)" class="res-0" />
    <circle cx="580" cy="280" r="6" fill="#8b5cf6" filter="url(#glow-purple-light)" class="res-1" />
    <circle cx="580" cy="280" r="6" fill="#8b5cf6" filter="url(#glow-purple-light)" class="res-2" />

</svg>