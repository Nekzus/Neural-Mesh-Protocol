<svg viewBox="0 0 800 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow-agent-d" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-worker-d" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-mesh-d" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <style>
        .text-title-d {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 16px;
            fill: #e2e8f0;
        }

        .text-sub-d {
            font-family: system-ui, sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: #94a3b8;
        }

        .text-tiny-d {
            font-family: monospace;
            font-size: 11px;
            fill: #fbbf24;
        }

        .conn-line-d {
            stroke: #334155;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dashAnimD 20s linear infinite;
        }

        @keyframes dashAnimD {
            to {
                stroke-dashoffset: -400;
            }
        }

        @keyframes moveTxD {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(200px);
                opacity: 0;
            }
        }

        @keyframes moveRxD {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(-200px);
                opacity: 0;
            }
        }

        .p-tx1-d {
            animation: moveTxD 1.5s linear infinite;
        }

        .p-tx2-d {
            animation: moveTxD 1.5s linear infinite -0.75s;
        }

        .p-rx1-d {
            animation: moveRxD 1.5s linear infinite;
        }

        .p-rx2-d {
            animation: moveRxD 1.5s linear infinite -0.75s;
        }

        @keyframes spinGearD {
            100% {
                transform: rotate(360deg);
            }
        }

        .spin-d {
            transform-box: fill-box;
            transform-origin: center;
            animation: spinGearD 3s linear infinite;
        }
    </style>

    <!-- Title -->
    <text x="400" y="40" class="text-title-d" text-anchor="middle" font-size="20" fill="#38bdf8">TypeScript SDK Runtime
        Flow (Node.js Tier-0)</text>

    <!-- Lines -->
    <line x1="160" y1="200" x2="330" y2="200" class="conn-line-d" />
    <line x1="490" y1="200" x2="630" y2="200" class="conn-line-d" />

    <!-- 1. Agent App -->
    <rect x="20" y="140" width="140" height="120" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"
        filter="url(#glow-agent-d)" />
    <text x="90" y="180" class="text-title-d" text-anchor="middle">Agent App</text>
    <text x="90" y="200" class="text-sub-d" text-anchor="middle">LLM Logic</text>
    <text x="90" y="220" class="text-sub-d" text-anchor="middle">Emitter</text>

    <!-- 2. Node.js SDK Container -->
    <rect x="230" y="80" width="550" height="280" rx="16" fill="#020617" stroke="#334155" stroke-width="2"
        stroke-dasharray="10 5" />
    <text x="505" y="110" class="text-sub-d" text-anchor="middle" fill="#94a3b8">@neural-mesh/sdk (Node V8
        Environment)</text>

    <!-- 2A. GuardianTS -->
    <rect x="250" y="140" width="120" height="120" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <text x="310" y="180" class="text-title-d" text-anchor="middle" fill="#fbbf24">GuardianTS</text>
    <text x="310" y="200" class="text-sub-d" text-anchor="middle">AST Heuristics</text>
    <text x="310" y="220" class="text-tiny-d" text-anchor="middle">(Cero-time Scan)</text>

    <!-- 2B. Worker Pool (Piscina) -->
    <rect x="420" y="140" width="140" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2"
        filter="url(#glow-worker-d)" />
    <text x="490" y="170" class="text-title-d" text-anchor="middle" fill="#c084fc">Worker Pool</text>
    <text x="490" y="190" class="text-sub-d" text-anchor="middle">Parallel Kyber768</text>
    <text x="490" y="210" class="text-sub-d" text-anchor="middle">&amp; AES-256-GCM</text>
    <g transform="translate(490, 235)">
        <g class="spin-d">
            <circle cx="0" cy="0" r="12" fill="none" stroke="#e879f9" stroke-width="2" stroke-dasharray="6 3" />
            <circle cx="0" cy="0" r="6" fill="#d946ef" />
        </g>
    </g>

    <!-- 2C. MeshNode -->
    <rect x="610" y="140" width="140" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"
        filter="url(#glow-mesh-d)" />
    <text x="680" y="180" class="text-title-d" text-anchor="middle" fill="#34d399">MeshNode</text>
    <text x="680" y="200" class="text-sub-d" text-anchor="middle">Libp2p Yamux</text>
    <text x="680" y="220" class="text-tiny-d" text-anchor="middle" fill="#6ee7b7">Multiplex Egress</text>

    <!-- Particles -->
    <circle cx="150" cy="190" r="4" fill="#38bdf8" class="p-tx1-d" />
    <circle cx="150" cy="190" r="4" fill="#38bdf8" class="p-tx2-d" />

    <circle cx="380" cy="200" r="4" fill="#fbbf24" class="p-tx1-d" />
    <circle cx="380" cy="200" r="4" fill="#fbbf24" class="p-tx2-d" />

    <circle cx="580" cy="210" r="4" fill="#c084fc" class="p-tx1-d" />
    <circle cx="580" cy="210" r="4" fill="#c084fc" class="p-tx2-d" />

    <circle cx="750" cy="190" r="4" fill="#10b981" class="p-tx1-d" />
    <circle cx="750" cy="190" r="4" fill="#10b981" class="p-tx2-d" />

    <!-- Return Flow -->
    <path d="M 680 260 L 680 320 L 90 320 L 90 260" fill="none" stroke="#a855f7" stroke-width="2"
        stroke-dasharray="6 6" />
    <text x="385" y="340" class="text-sub-d" text-anchor="middle" fill="#c084fc">ZK-Receipt / AES Payload Return</text>

    <g transform="translate(680, 260)">
        <circle cx="0" cy="0" r="5" fill="#a855f7" class="p-rx1-d" />
        <circle cx="0" cy="0" r="5" fill="#a855f7" class="p-rx2-d" />
    </g>
    <g transform="translate(480, 260)">
        <circle cx="0" cy="0" r="5" fill="#a855f7" class="p-rx1-d" />
        <circle cx="0" cy="0" r="5" fill="#a855f7" class="p-rx2-d" />
    </g>
</svg>