<svg viewBox="0 0 800 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Dropshadow filter for glowing text/boxes (Removed for mobile performance 60fps) -->
    </defs>

    <style>
        .text-title-d {
            font-family: system-ui, sans-serif;
            font-weight: 700;
            font-size: 16px;
            fill: #e2e8f0;
        }

        .text-sub-d {
            font-family: system-ui, sans-serif;
            font-weight: 500;
            font-size: 12px;
            fill: #94a3b8;
        }

        .text-tiny-d {
            font-family: monospace;
            font-size: 11px;
            fill: #fbbf24;
        }

        .conn-line-d {
            stroke: #334155;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dashAnimD 20s linear infinite;
        }

        .conn-line-rx-d {
            stroke: #a855f7;
            stroke-width: 2;
            stroke-dasharray: 6, 6;
            animation: dashAnimD 20s linear infinite;
        }

        @keyframes dashAnimD {
            to {
                stroke-dashoffset: -400;
            }
        }

        @keyframes move90-d {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(90px);
                opacity: 0;
            }
        }

        @keyframes move50-d {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateX(50px);
                opacity: 0;
            }
        }

        @keyframes moveReturn-d {
            0% {
                transform: translateX(0px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translateX(-590px);
                opacity: 0;
            }
        }

        @keyframes rxPath1-d {
            0% {
                transform: translate(680px, 260px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            14.8% {
                transform: translate(680px, 300px);
            }

            85.2% {
                transform: translate(490px, 300px);
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translate(490px, 260px);
                opacity: 0;
            }
        }

        @keyframes rxPath2-d {
            0% {
                transform: translate(450px, 260px);
                opacity: 0;
            }

            2% {
                opacity: 1;
            }

            15.4% {
                transform: translate(450px, 340px);
            }

            84.6% {
                transform: translate(90px, 340px);
            }

            98% {
                opacity: 1;
            }

            100% {
                transform: translate(90px, 260px);
                opacity: 0;
            }
        }

        .anim-90-1-d {
            animation: move90-d 1.5s linear infinite;
        }

        .anim-90-2-d {
            animation: move90-d 1.5s linear infinite 0.75s;
        }

        .anim-50-1-d {
            animation: move50-d 1s linear infinite;
        }

        .anim-50-2-d {
            animation: move50-d 1s linear infinite 0.5s;
        }

        .anim-ret-1-d {
            animation: moveReturn-d 3s linear infinite;
        }

        .anim-ret-2-d {
            animation: moveReturn-d 3s linear infinite 1.5s;
        }

        .anim-r1-1-d {
            animation: rxPath1-d 2s linear infinite;
        }

        .anim-r1-2-d {
            animation: rxPath1-d 2s linear infinite 1s;
        }

        .anim-r2-1-d {
            animation: rxPath2-d 3.5s linear infinite;
        }

        .anim-r2-2-d {
            animation: rxPath2-d 3.5s linear infinite 1.75s;
        }

        @keyframes spinGearD {
            100% {
                transform: rotate(360deg);
            }
        }

        .spin-d {
            transform-box: fill-box;
            transform-origin: center;
            animation: spinGearD 3s linear infinite;
        }
    </style>

    <!-- Title -->
    <text x="400" y="40" class="text-title-d" text-anchor="middle" font-size="20" fill="#38bdf8">TypeScript SDK Runtime
        Flow (Node.js Tier-0)</text>

    <!-- Lines -->
    <line x1="160" y1="200" x2="250" y2="200" class="conn-line-d" />
    <line x1="370" y1="200" x2="420" y2="200" class="conn-line-d" />
    <line x1="560" y1="200" x2="610" y2="200" class="conn-line-d" />
    <line x1="750" y1="200" x2="800" y2="200" class="conn-line-d" />

    <!-- 1. Agent App -->
    <rect x="20" y="140" width="140" height="120" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="2" />
    <text x="90" y="180" class="text-title-d" text-anchor="middle">Agent App</text>
    <text x="90" y="200" class="text-sub-d" text-anchor="middle">LLM Logic</text>
    <text x="90" y="220" class="text-sub-d" text-anchor="middle">Emitter</text>

    <!-- 2. Node.js SDK Container -->
    <rect x="230" y="80" width="550" height="280" rx="16" fill="#020617" stroke="#334155" stroke-width="2"
        stroke-dasharray="10 5" />
    <text x="505" y="110" class="text-sub-d" text-anchor="middle" fill="#94a3b8">@neural-mesh/sdk (Node V8
        Environment)</text>

    <!-- 2A. GuardianTS -->
    <rect x="250" y="140" width="120" height="120" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2" />
    <text x="310" y="180" class="text-title-d" text-anchor="middle" fill="#fbbf24">GuardianTS</text>
    <text x="310" y="200" class="text-sub-d" text-anchor="middle">AST Heuristics</text>
    <text x="310" y="220" class="text-tiny-d" text-anchor="middle">(Cero-time Scan)</text>

    <!-- 2B. Worker Pool (Piscina) -->
    <rect x="420" y="140" width="140" height="120" rx="8" fill="#1e293b" stroke="#a855f7" stroke-width="2" />
    <text x="490" y="170" class="text-title-d" text-anchor="middle" fill="#c084fc">Worker Pool</text>
    <text x="490" y="190" class="text-sub-d" text-anchor="middle">Parallel Kyber768</text>
    <text x="490" y="210" class="text-sub-d" text-anchor="middle">&amp; AES-256-GCM</text>
    <g transform="translate(490, 235)">
        <g class="spin-d">
            <circle cx="0" cy="0" r="12" fill="none" stroke="#e879f9" stroke-width="2" stroke-dasharray="6 3" />
            <circle cx="0" cy="0" r="6" fill="#d946ef" />
        </g>
    </g>

    <!-- 2C. MeshNode -->
    <rect x="610" y="140" width="140" height="120" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2" />
    <text x="680" y="180" class="text-title-d" text-anchor="middle" fill="#34d399">MeshNode</text>
    <text x="680" y="200" class="text-sub-d" text-anchor="middle">Libp2p Yamux</text>
    <text x="680" y="220" class="text-tiny-d" text-anchor="middle" fill="#6ee7b7">Multiplex Egress</text>

    <!-- Particles -->
    <!-- Gap 1: Agent to Guardian -->
    <g transform="translate(160, 200)">
        <circle cx="0" cy="0" r="4" fill="#38bdf8" class="anim-90-1-d" />
        <circle cx="0" cy="0" r="4" fill="#38bdf8" class="anim-90-2-d" />
    </g>

    <!-- Gap 2: Guardian to Worker -->
    <g transform="translate(370, 200)">
        <circle cx="0" cy="0" r="4" fill="#fbbf24" class="anim-50-1-d" />
        <circle cx="0" cy="0" r="4" fill="#fbbf24" class="anim-50-2-d" />
    </g>

    <!-- Gap 3: Worker to MeshNode -->
    <g transform="translate(560, 200)">
        <circle cx="0" cy="0" r="4" fill="#c084fc" class="anim-50-1-d" />
        <circle cx="0" cy="0" r="4" fill="#c084fc" class="anim-50-2-d" />
    </g>

    <!-- Gap 4: MeshNode Ext -->
    <g transform="translate(750, 200)">
        <circle cx="0" cy="0" r="4" fill="#10b981" class="anim-50-1-d" />
        <circle cx="0" cy="0" r="4" fill="#10b981" class="anim-50-2-d" />
    </g>

    <!-- Return Flow 1: MeshNode -> Worker Pool -->
    <path d="M 680 260 L 680 300 L 490 300 L 490 260" fill="none" class="conn-line-rx-d" />
    <text x="585" y="290" class="text-sub-d" text-anchor="middle" fill="#c084fc">ZK-Receipt / AES Payload</text>

    <!-- Return Particles 1 -->
    <circle cx="0" cy="0" r="5" fill="#a855f7" class="anim-r1-1-d" />
    <circle cx="0" cy="0" r="5" fill="#a855f7" class="anim-r1-2-d" />

    <!-- Return Flow 2: Worker Pool -> Agent App -->
    <path d="M 450 260 L 450 340 L 90 340 L 90 260" fill="none" class="conn-line-rx-d" />
    <text x="270" y="330" class="text-sub-d" text-anchor="middle" fill="#38bdf8">Verified Plaintext Result</text>

    <!-- Return Particles 2 -->
    <circle cx="0" cy="0" r="5" fill="#38bdf8" class="anim-r2-1-d" />
    <circle cx="0" cy="0" r="5" fill="#38bdf8" class="anim-r2-2-d" />
</svg>