<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="400" fill="#09090b" rx="16" />
    <!-- Fonts & Styles -->
    <style>
        text {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            fill: #FAFAFA;
            font-size: 14px;
        }

        .title {
            font-weight: 700;
            font-size: 18px;
            fill: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 11px;
            fill: #A1A1AA;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .box {
            fill: #18181b;
            stroke: #3f3f46;
            stroke-width: 2;
            rx: 8;
        }

        .box-highlight {
            fill: #27272a;
            stroke: #71717a;
            stroke-width: 2;
            rx: 8;
        }

        .box-transparent {
            fill: none;
            stroke: #3f3f46;
            stroke-width: 2;
            stroke-dasharray: 6 6;
            rx: 12;
        }

        .line {
            stroke: #52525b;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .line-active {
            stroke: #FAFAFA;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .arrow {
            fill: #52525b;
        }

        .arrow-active {
            fill: #FAFAFA;
        }
    </style>
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
        </marker>
        <marker id="arrowhead-active" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow-active" />
        </marker>
        <marker id="arrowhead-reverse" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
            <polygon points="10 0, 0 3.5, 10 7" class="arrow" />
        </marker>
    </defs>

    <!-- Headers -->
    <text x="400" y="35" text-anchor="middle" class="title">NEURAL MESH TOPOLOGY</text>

    <!-- Agent Node Area (Left) -->
    <rect x="40" y="60" width="200" height="300" class="box-transparent" />
    <text x="140" y="90" text-anchor="middle" class="title">Agent Node</text>
    <text x="140" y="110" text-anchor="middle" class="subtitle">Client Module</text>

    <rect x="60" y="130" width="160" height="45" class="box-highlight" />
    <text x="140" y="157" text-anchor="middle">AI / LLM Engine</text>
    <path d="M 140 175 L 140 195" class="line" marker-end="url(#arrowhead)" />

    <rect x="60" y="200" width="160" height="45" class="box" />
    <text x="140" y="227" text-anchor="middle">WASM Compiler</text>
    <path d="M 140 245 L 140 265" class="line" marker-end="url(#arrowhead)" />

    <rect x="60" y="270" width="160" height="45" class="box-highlight" />
    <text x="140" y="297" text-anchor="middle">NmpClient</text>

    <!-- Network Area (Middle) -->
    <rect x="300" y="60" width="200" height="300" class="box-transparent" />
    <text x="400" y="90" text-anchor="middle" class="title">The Mesh</text>
    <text x="400" y="110" text-anchor="middle" class="subtitle">Transport Layer</text>

    <circle cx="400" cy="170" r="40" class="box" />
    <text x="400" y="175" text-anchor="middle">HTTP/3</text>
    <text x="400" y="195" text-anchor="middle" font-size="10" fill="#a1a1aa">(QUIC)</text>

    <circle cx="400" cy="270" r="40" class="box-highlight" />
    <text x="400" y="275" text-anchor="middle">DHT</text>

    <path d="M 400 215 L 400 225" class="line" marker-end="url(#arrowhead)" marker-start="url(#arrowhead-reverse)" />

    <!-- Left to Middle connections -->
    <path d="M 220 292 L 355 292" class="line-active" marker-end="url(#arrowhead-active)" />
    <text x="287" y="285" text-anchor="middle" font-size="11" fill="#FFFFFF">Ed25519</text>

    <path d="M 220 170 L 355 170" class="line" marker-end="url(#arrowhead)" marker-start="url(#arrowhead-reverse)" />
    <text x="287" y="163" text-anchor="middle" font-size="11">Noise PQC</text>

    <!-- Data Node Area (Right) -->
    <rect x="560" y="60" width="200" height="300" class="box-transparent" />
    <text x="660" y="90" text-anchor="middle" class="title">Data Node</text>
    <text x="660" y="110" text-anchor="middle" class="subtitle">Server Module</text>

    <rect x="580" y="130" width="160" height="40" class="box-highlight" />
    <text x="660" y="155" text-anchor="middle">NmpServer (gRPC)</text>
    <path d="M 660 170 L 660 185" class="line" marker-end="url(#arrowhead)" />

    <rect x="580" y="190" width="160" height="35" class="box" />
    <text x="660" y="213" text-anchor="middle" font-size="12">AST Guardian</text>
    <path d="M 660 225 L 660 240" class="line" marker-end="url(#arrowhead)" />

    <rect x="580" y="245" width="160" height="40" class="box-highlight" />
    <text x="660" y="270" text-anchor="middle">WASI Sandbox</text>
    <path d="M 660 285 L 660 300" class="line" marker-end="url(#arrowhead)" />

    <rect x="580" y="305" width="160" height="35" class="box" />
    <text x="660" y="327" text-anchor="middle" font-size="12">Host Origin Data</text>

    <!-- Middle to Right connections -->
    <path d="M 445 170 L 515 170 L 515 150 L 575 150" class="line-active" marker-end="url(#arrowhead-active)"
        marker-start="url(#arrowhead-reverse)" />
    <text x="515" y="140" text-anchor="middle" font-size="11" fill="#FFFFFF">Protobuf Stream</text>

</svg>