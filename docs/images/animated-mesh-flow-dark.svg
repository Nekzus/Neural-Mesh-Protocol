<svg viewBox="0 0 800 400" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dropshadow filter for glowing text/boxes -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-rose" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Animation Paths -->
    <path id="path-req" d="M 220 160 L 580 160" fill="none" />
    <path id="path-res" d="M 580 280 L 220 280" fill="none" />
    <path id="path-processing"
      d="M 660 180 C 690 180, 710 200, 710 230 C 710 260, 690 280, 660 280 C 630 280, 610 260, 610 230 C 610 200, 630 180, 660 180 Z"
      fill="none" />
  </defs>

  <style>
    .text-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #e2e8f0;
    }

    .text-sub {
      font-family: system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 14px;
      fill: #94a3b8;
    }

    .text-tiny {
      font-family: monospace;
      font-size: 12px;
      fill: #fbbf24;
    }

    .conn-line {
      stroke: #334155;
      stroke-width: 2;
      stroke-dasharray: 6, 6;
      animation: dash 20s linear infinite;
    }

    @keyframes dash {
      to {
        stroke-dashoffset: -400;
      }
    }
  </style>

  <!-- Connection Lines Background -->
  <line x1="220" y1="160" x2="580" y2="160" class="conn-line" />
  <line x1="580" y1="280" x2="220" y2="280" class="conn-line" />
  <text x="400" y="145" class="text-sub" text-anchor="middle">QUIC + Kyber Encapsulation (gRPC)</text>
  <text x="400" y="305" class="text-sub" text-anchor="middle">ZK-Receipt + AES Result</text>

  <!-- Agent Node -->
  <rect x="20" y="100" width="200" height="240" rx="12" fill="#0f172a" stroke="#0ea5e9" stroke-width="2"
    filter="url(#glow-blue)" />
  <text x="120" y="140" class="text-title" text-anchor="middle">Agent Client</text>
  <text x="120" y="165" class="text-sub" text-anchor="middle">Logic Injector</text>

  <rect x="40" y="200" width="160" height="120" rx="6" fill="#1e293b" />
  <text x="120" y="225" class="text-sub" text-anchor="middle">1. Build WebAssembly</text>
  <text x="120" y="255" class="text-sub" text-anchor="middle">2. Guardian AST Check</text>
  <text x="120" y="285" class="text-sub" text-anchor="middle">3. Stream Data</text>

  <!-- Data Node -->
  <rect x="580" y="100" width="200" height="240" rx="12" fill="#0f172a" stroke="#8b5cf6" stroke-width="2"
    filter="url(#glow-purple)" />
  <text x="680" y="140" class="text-title" text-anchor="middle">Data Server</text>
  <text x="680" y="165" class="text-sub" text-anchor="middle">Zero-Trust Node</text>

  <rect x="600" y="180" width="160" height="140" rx="8" fill="#450a0a" stroke="#f43f5e" stroke-width="2" />
  <text x="680" y="205" class="text-tiny" text-anchor="middle">TEE ENCLAVE / WASI</text>
  <text x="680" y="240" class="text-sub" text-anchor="middle" fill="#fecdd3">Blind Computing</text>
  <text x="680" y="260" class="text-sub" text-anchor="middle" fill="#fecdd3">Generating ZK Proof</text>

  <!-- Animated Circulating Particles -->
  <!-- Request Packets (Blue) -->
  <circle cx="220" cy="160" r="6" fill="#38bdf8" filter="url(#glow-blue)">
    <animate attributeName="cx" from="220" to="580" dur="2s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="160" r="6" fill="#38bdf8" filter="url(#glow-blue)">
    <animate attributeName="cx" from="220" to="580" dur="2s" begin="0.66s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2s" begin="0.66s"
      repeatCount="indefinite" />
  </circle>
  <circle cx="220" cy="160" r="6" fill="#38bdf8" filter="url(#glow-blue)">
    <animate attributeName="cx" from="220" to="580" dur="2s" begin="1.33s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2s" begin="1.33s"
      repeatCount="indefinite" />
  </circle>

  <!-- Processing Packets inside WASI (Rose/Yellow) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 660 230" to="360 660 230" dur="1.5s"
      repeatCount="indefinite" />
    <circle cx="660" cy="180" r="4" fill="#fbbf24" filter="url(#glow-rose)" />
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="120 660 230" to="480 660 230" dur="1.5s"
      repeatCount="indefinite" />
    <circle cx="660" cy="180" r="4" fill="#fbbf24" filter="url(#glow-rose)" />
  </g>
  <g>
    <animateTransform attributeName="transform" type="rotate" from="240 660 230" to="600 660 230" dur="1.5s"
      repeatCount="indefinite" />
    <circle cx="660" cy="180" r="4" fill="#fbbf24" filter="url(#glow-rose)" />
  </g>

  <!-- Response Packets (Purple) -->
  <circle cx="580" cy="280" r="6" fill="#a78bfa" filter="url(#glow-purple)">
    <animate attributeName="cx" from="580" to="220" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="580" cy="280" r="6" fill="#a78bfa" filter="url(#glow-purple)">
    <animate attributeName="cx" from="580" to="220" dur="2.5s" begin="0.83s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.5s" begin="0.83s"
      repeatCount="indefinite" />
  </circle>
  <circle cx="580" cy="280" r="6" fill="#a78bfa" filter="url(#glow-purple)">
    <animate attributeName="cx" from="580" to="220" dur="2.5s" begin="1.66s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.5s" begin="1.66s"
      repeatCount="indefinite" />
  </circle>

</svg>