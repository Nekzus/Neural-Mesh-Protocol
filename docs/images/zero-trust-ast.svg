<svg width="800" height="260" viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg">
    <rect width="800" height="260" fill="#09090b" rx="16" />
    <!-- Fonts & Styles -->
    <style>
        text {
            font-family: 'Inter', system-ui, sans-serif;
            fill: #FAFAFA;
            font-size: 13px;
        }

        .title {
            font-weight: 700;
            font-size: 16px;
            fill: #FFFFFF;
        }

        .box {
            fill: #18181b;
            stroke: #3f3f46;
            stroke-width: 2;
            rx: 8;
        }

        .box-red {
            fill: #450a0a;
            stroke: #ef4444;
            stroke-width: 2;
            rx: 8;
        }

        .box-green {
            fill: #052e16;
            stroke: #10b981;
            stroke-width: 2;
            rx: 8;
        }

        .line {
            stroke: #52525b;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
        }

        .arrow {
            fill: #52525b;
        }
    </style>
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" class="arrow" />
        </marker>
    </defs>

    <rect x="40" y="110" width="160" height="40" class="box" />
    <text x="120" y="135" text-anchor="middle" font-weight="700">WASM Bytecode</text>

    <polygon points="280,130 360,90 440,130 360,170" class="box" />
    <text x="360" y="134" text-anchor="middle" font-weight="700">AST Parser</text>

    <rect x="600" y="50" width="160" height="40" class="box-red" />
    <text x="680" y="75" text-anchor="middle" fill="#fca5a5">Dropped (Loops > 100)</text>

    <rect x="600" y="110" width="160" height="40" class="box-red" />
    <text x="680" y="135" text-anchor="middle" fill="#fca5a5">Dropped (Socket API)</text>

    <rect x="600" y="170" width="160" height="40" class="box-green" />
    <text x="680" y="195" text-anchor="middle" fill="#6ee7b7">Deterministic Core</text>

    <!-- Lines -->
    <path d="M 200 130 L 270 130" class="line" marker-end="url(#arrow)" />

    <path d="M 400 110 L 460 70 L 590 70" class="line" marker-end="url(#arrow)" />
    <path d="M 440 130 L 590 130" class="line" marker-end="url(#arrow)" />
    <path d="M 400 150 L 460 190 L 590 190" class="line" marker-end="url(#arrow)" />

</svg>