    <!-- Right Box 1 -->
    <rect x="730" y="40" width="250" height="76" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1" />
    <text x="855" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700"
        fill="#fafafa" text-anchor="middle">Data and file systems</text>
    <text x="855" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400"
        fill="#d4d4d8" text-anchor="middle">PostgreSQL, SQLite, Kademlia</text>

    <!-- Right Box 2 -->
    <rect x="730" y="140" width="250" height="76" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1" />
    <text x="855" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700"
        fill="#fafafa" text-anchor="middle">Isolated Compute</text>
    <text x="855" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400"
        fill="#d4d4d8" text-anchor="middle">Wasmtime Enclaves, WASI</text>

    <!-- Right Box 3 -->
    <rect x="730" y="240" width="250" height="76" rx="6" fill="#18181b" stroke="#3f3f46" stroke-width="1" />
    <text x="855" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700"
        fill="#fafafa" text-anchor="middle">Productivity tools</text>
    <text x="855" y="296" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400"
        fill="#d4d4d8" text-anchor="middle">Slack, GitHub, Stripe APIs</text>

    <!-- Connecting Lines (Left to Center) -->
    <path d="M 270 78 C 320 78, 300 150, 350 150" stroke="#71717a" stroke-width="2" fill="none"
        marker-end="url(#arrow-right)" />
    <path d="M 270 178 L 350 178" stroke="#71717a" stroke-width="2" fill="none" marker-end="url(#arrow-right)" />
    <path d="M 270 278 C 320 278, 300 206, 350 206" stroke="#71717a" stroke-width="2" fill="none"
        marker-end="url(#arrow-right)" />

    <!-- Connecting Lines (Center to Right) -->
    <path d="M 650 150 C 700 150, 680 78, 730 78" stroke="#71717a" stroke-width="2" fill="none"
        marker-start="url(#arrow-left)" marker-end="url(#arrow-right)" />
    <path d="M 650 178 L 730 178" stroke="#71717a" stroke-width="2" fill="none" marker-start="url(#arrow-left)"
        marker-end="url(#arrow-right)" />
    <path d="M 650 206 C 700 206, 680 278, 730 278" stroke="#71717a" stroke-width="2" fill="none"
        marker-start="url(#arrow-left)" marker-end="url(#arrow-right)" />

</svg>